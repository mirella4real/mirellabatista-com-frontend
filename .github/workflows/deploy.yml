name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'css/**'
      - 'scripts/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::127214179898:role/github-actions-frontend
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync . s3://www.mirella-batista.com \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude ".DS_Store" \
            --exclude "*.config.js" \
            --exclude ".prettierrc" \
            --exclude "package*.json" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3UKM0A6UG4IC5 \
            --paths "/*"
